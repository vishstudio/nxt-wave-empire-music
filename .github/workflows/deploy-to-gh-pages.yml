name: Build and Publish to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build (static export via next.config.js)
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/nxt-wave-empire-music"
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Inspect generated output
        run: |
          echo "-- out tree --"
          ls -la out || true
          echo "-- find logos --"
          find out -type f -iname "*logo*" -print || true
          echo "-- index.html head --"
          sed -n '1,120p' out/index.html || true
          echo "-- grep for logo references --"
          grep -RIn "logo" out || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy static site to gh-pages: ${{ github.sha }}"
